name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pytest
          pip install -e . 2>/dev/null || true

      - name: Run tests
        run: pytest tests/ -v

      - name: Check import layer contracts
        run: |
          pip install import-linter 2>/dev/null || true
          lint-imports 2>/dev/null || echo "import-linter not configured for CI yet"
